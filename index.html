<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Portfolio</title>
    <link rel="stylesheet" href="portfolio-nav.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; }
        .landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; text-align: center; padding: 60px 20px; }
        .landing h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; margin-bottom: 12px; letter-spacing: 2px; }
        .landing p { font-size: clamp(0.9rem, 2vw, 1.1rem); color: rgba(255,255,255,0.6); margin-bottom: 48px; max-width: 500px; line-height: 1.6; }
        .projects { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .project-card { width: 340px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: transform .3s, box-shadow .3s; text-decoration: none; color: #fff; }
        .project-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .project-card .card-img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .project-card .card-body { padding: 24px; }
        .project-card h2 { font-size: 1.2rem; margin-bottom: 8px; font-weight: 600; }
        .project-card span { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .card-img-placeholder { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .card-img-placeholder.p1 { background: linear-gradient(135deg, #d4a44c, #614c45); }
        .card-img-placeholder.p2 { background: linear-gradient(135deg, #1a1a2e, #e94560); }
    </style>
</head>
<body>
    <nav class="pf-nav">
        <div class="pf-nav-inner">
            <a href="/" class="pf-nav-logo">Portfolio</a>
            <div class="pf-nav-links">
                <a href="/01_brando_restaurant_responsive_website/">Brando Restaurant</a>
                <a href="/02_portfolio_uiux_responsive_honggo_fashion/">Hongo Fashion</a>
            </div>
        </div>
    </nav>
    <div class="landing">
        <h1>FRONTEND PORTFOLIO</h1>
        <p>웹 표준과 웹 접근성을 준수한 반응형 웹사이트 포트폴리오입니다.</p>
        <div class="projects">
            <a href="/01_brando_restaurant_responsive_website/" class="project-card">
                <div class="card-img-placeholder p1">&#127860;</div>
                <div class="card-body">
                    <h2>Brando Restaurant</h2>
                    <span>반응형 웹사이트 &middot; HTML5 / CSS3 / jQuery</span>
                </div>
            </a>
            <a href="/02_portfolio_uiux_responsive_honggo_fashion/" class="project-card">
                <div class="card-img-placeholder p2">&#128090;</div>
                <div class="card-body">
                    <h2>Hongo Fashion</h2>
                    <span>UI/UX 반응형 웹사이트 &middot; HTML5 / SCSS / Vanilla JS</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
